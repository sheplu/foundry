<div part="container" data-ref="container">
  <span part="icon" data-ref="icon"><slot name="icon" data-ref="iconSlot"></slot></span>
  <div part="content">
    <span part="title" data-ref="title"><slot name="title" data-ref="titleSlot"></slot></span>
    <span part="body"><slot></slot></span>
  </div>
  <button
    type="button"
    part="close-button"
    data-ref="closeButton"
    aria-label="Close notification"
  >
    <svg
      part="close-icon"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </button>
</div>
